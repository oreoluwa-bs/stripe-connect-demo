<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Connect Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Spurt Connect</h1>
            <p class="subtitle">Manage your payments and deposits</p>
        </header>

        <!-- Account Management Section -->
        <div class="section">
            <p class="section-title">Your Connect Account</p>
            <div id="account-setup" class="card">
                <div id="no-account">
                    <p style="margin-bottom: 16px; font-size: 0.9rem;">You don't have a Stripe Connect account yet.</p>
                    <button id="btn-create-account" class="primary">
                        <span>Create Account</span>
                    </button>
                </div>

                <div id="has-account" class="hidden">
                    <div id="account-status" class="status-badge status-pending">Connected</div>
                    <p id="display-account-id" style="font-family: monospace; font-size: 0.8rem; margin-bottom: 20px; color: var(--text-muted);"></p>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button id="btn-onboard" class="primary">Complete Onboarding</button>
                        <button id="btn-dashboard" class="secondary">View Dashboard</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Deposit Section -->
        <div id="deposit-section" class="section hidden">
            <p class="section-title">Make a Deposit</p>
            <div class="card">
                <div class="input-group">
                    <label for="amount">Amount (USD)</label>
                    <input type="number" id="amount" placeholder="e.g. 25.00" value="25.00">
                </div>
                <button id="btn-deposit" class="primary">
                    <span>Deposit to Account</span>
                </button>
            </div>
        </div>

        <footer style="margin-top: 40px; text-align: center;">
            <button id="btn-reset" class="secondary" style="width: auto; padding: 8px 16px; font-size: 0.75rem;">Reset Session (LocalOnly)</button>
        </footer>
    </div>

    <script>
        const API_BASE = '/api/connect';
        
        // UI Elements
        const noAccountEl = document.getElementById('no-account');
        const hasAccountEl = document.getElementById('has-account');
        const depositSection = document.getElementById('deposit-section');
        const accountIdDisplay = document.getElementById('display-account-id');
        
        const btnCreateAccount = document.getElementById('btn-create-account');
        const btnOnboard = document.getElementById('btn-onboard');
        const btnDashboard = document.getElementById('btn-dashboard');
        const btnDeposit = document.getElementById('btn-deposit');
        const btnReset = document.getElementById('btn-reset');

        let accountId = localStorage.getItem('stripe_account_id');

        function updateUI() {
            if (accountId) {
                noAccountEl.classList.add('hidden');
                hasAccountEl.classList.remove('hidden');
                depositSection.classList.remove('hidden');
                accountIdDisplay.textContent = accountId;
            } else {
                noAccountEl.classList.remove('hidden');
                hasAccountEl.classList.add('hidden');
                depositSection.classList.add('hidden');
            }
        }

        // 1. Create Account
        btnCreateAccount.addEventListener('click', async () => {
            btnCreateAccount.disabled = true;
            btnCreateAccount.innerHTML = '<div class="loader"></div>';
            
            try {
                const res = await fetch(`${API_BASE}/create-account`, { method: 'POST' });
                const data = await res.json();
                
                if (data.accountId) {
                    accountId = data.accountId;
                    localStorage.setItem('stripe_account_id', accountId);
                    updateUI();
                } else {
                    alert('Error creating account: ' + data.error);
                }
            } catch (err) {
                alert('Request failed');
            } finally {
                btnCreateAccount.disabled = false;
                btnCreateAccount.innerHTML = '<span>Create Account</span>';
            }
        });

        // 2. Onboarding / Dashboard
        async function getAccountLink(type) {
            const btn = type === 'account_onboarding' ? btnOnboard : btnDashboard;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div>';

            try {
                const res = await fetch(`${API_BASE}/create-account-link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId,
                        type: type, // 'account_onboarding' or 'login'
                        return_url: window.location.origin,
                        refresh_url: window.location.origin
                    })
                });
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Request failed');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        btnOnboard.addEventListener('click', () => getAccountLink('account_onboarding'));
        btnDashboard.addEventListener('click', () => getAccountLink('login'));

        // 3. Deposit
        btnDeposit.addEventListener('click', async () => {
            const amount = parseFloat(document.getElementById('amount').value);
            if (isNaN(amount) || amount <= 0) return alert('Enter a valid amount');

            btnDeposit.disabled = true;
            btnDeposit.innerHTML = '<div class="loader"></div>';

            try {
                const res = await fetch(`${API_BASE}/create-deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        accountId,
                        amount: Math.round(amount * 100), // convert to cents
                        currency: 'usd'
                    })
                });
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Request failed');
            } finally {
                btnDeposit.disabled = false;
                btnDeposit.innerHTML = '<span>Deposit to Account</span>';
            }
        });

        btnReset.addEventListener('click', () => {
            localStorage.removeItem('stripe_account_id');
            window.location.reload();
        });

        updateUI();
    </script>
</body>
</html>
